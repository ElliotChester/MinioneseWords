        function setWordOfTheDay() {
            // 1. Get the current date in UTC. 
            // Using UTC ensures the word changes at the exact same moment for everyone globally,
            // regardless of their local timezone.
            const today = new Date();
            const utcDate = Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate());
            
            // 2. Calculate the total number of days since the Unix Epoch (Jan 1, 1970).
            const daysSinceEpoch = Math.floor(utcDate / (1000 * 60 * 60 * 24));
            
            // 3. Use the modulo operator (%) to find a consistent index in the array.
            // This will loop back to the start of the array automatically when it reaches the end.
            const dailyIndex = daysSinceEpoch % minionDictionary.length;
            const wordOfTheDay = minionDictionary[dailyIndex];

            // 4. Update the HTML elements with the selected word's data.
            document.getElementById('minion-word').textContent = wordOfTheDay.minion;
            document.getElementById('pronunciation').textContent = `/${wordOfTheDay.pronunciation}/`;
            document.getElementById('english-word').textContent = wordOfTheDay.english;
        }

        // Initialise the script once the page has loaded
        document.addEventListener('DOMContentLoaded', setWordOfTheDay);
